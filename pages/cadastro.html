<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuMigos - Cadastro</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="auth-page auth-page--cadastro">
    <!-- Botão de Voltar -->
    <a href="login.html" class="back-button" title="Voltar para login">
        <img src="../assets/img/arrowback.png" alt="Voltar" class="back-button__icon">
    </a>

    <div class="auth-container">
        <div class="auth-card auth-card--cadastro">
                <div class="auth-header">
                    <img src="../assets/img/Prancheta 4.png" alt="AuMigos Logo" class="auth-logo">
                </div>

                <form method="POST" action="processar.php" class="auth-form">
                    <select name="perfil" id="cadastro-perfil-select" required class="auth-input auth-input--filled auth-select">
                        <option value="" disabled selected>Selecione seu Perfil</option>
                        <option value="ong">ONG</option>
                        <option value="apoiador">Apoiador</option>
                        <option value="adotante">Adotante</option>
                    </select>

                    <input type="text" name="nome" id="cadastro-nome-input" placeholder="Nome Completo" required class="auth-input auth-input--filled">
                    
                    <input type="text" name="cpf_cnpj" id="cadastro-cpf-cnpj-input" placeholder="CPF/CNPJ" required class="auth-input auth-input--filled">
                    
                    <input type="email" name="email" placeholder="Email" required class="auth-input auth-input--filled">
                    
                    <input type="tel" name="telefone" id="cadastro-telefone-input" placeholder="Telefone/Celular" required class="auth-input auth-input--filled" maxlength="15">
                    
                    <div class="auth-password-wrapper">
                        <input type="password" name="senha" id="cadastro-password-input" placeholder="Senha" required class="auth-input auth-input--filled">
                        <button type="button" class="auth-password-toggle" id="cadastro-password-toggle">
                            <img src="../assets/img/eyeclose.png" alt="Mostrar senha" id="cadastro-eye-icon" class="auth-password-toggle__icon">
                        </button>
                    </div>

                    <div class="auth-password-wrapper">
                        <input type="password" name="confirmar-senha" id="cadastro-confirm-password-input" placeholder="Confirmar Senha" required class="auth-input auth-input--filled">
                        <button type="button" class="auth-password-toggle" id="cadastro-confirm-toggle">
                            <img src="../assets/img/eyeclose.png" alt="Mostrar senha" id="cadastro-confirm-eye-icon" class="auth-password-toggle__icon">
                        </button>
                    </div>
                    <div id="password-match-message" class="password-match-message"></div>

                    <button type="submit" class="auth-button auth-button--outline" id="cadastro-submit-btn">
                        Criar conta!
                    </button>
                </form>

                <p class="auth-link-text">
                    <a href="login.html">Já tenho uma conta</a>
                </p>
        </div>
    </div>

    <script src="../assets/js/script.js"></script>
</body>

</html>
