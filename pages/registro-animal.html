<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuMigos - Registro de Animal</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="registro-page">

    <div class="modal-container">
        <button class="btn-close" title="Fechar" onclick="window.location.href='consulta-animal.html'">&times;</button>

        <div class="form-content">
            <h2>Registro de Animal</h2>

            <form id="registroAnimalForm">
                <div id="step1" class="step active">
                    <div class="subtitle">Dados Básicos</div>

                    <div class="form-grid">
                        <div class="input-group">
                            <label>Nome</label>
                            <input type="text" id="campo-nome" placeholder="">
                        </div>

                        <div class="input-group" style="justify-content: flex-end; padding-bottom: 5px;">
                            <div class="photo-upload">
                                <div class="photo-icon">📷</div>
                                <span>Adicionar Foto</span>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Espécie</label>
                            <select id="campo-especie">
                                <option value=""></option>
                                <option value="cachorro">Cachorro</option>
                                <option value="gato">Gato</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label>Data de Nascimento</label>
                            <input type="date" id="campo-nascimento">
                        </div>

                        <div class="input-group">
                            <label>Raça</label>
                            <input type="text" id="campo-raca">
                        </div>

                        <div class="input-group">
                            <label>Cor</label>
                            <input type="text" id="campo-cor">
                        </div>

                        <div class="input-group">
                            <label>Gênero</label>
                            <div class="gender-toggle">
                                <button type="button" id="btn-femea" class="active">Fêmea</button>
                                <button type="button" id="btn-macho">Macho</button>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Porte/Tamanho</label>
                            <select id="campo-porte">
                                <option value=""></option>
                                <option value="pequeno">Pequeno</option>
                                <option value="medio">Médio</option>
                                <option value="grande">Grande</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="step2" class="step">
                    <div class="subtitle">Dados de Entrada</div>

                    <div class="form-grid">
                        <div class="input-group full-width" style="max-width: 48%;">
                            <label>Data de Entrada</label>
                            <input type="date" id="campo-entrada">
                        </div>

                        <div class="input-group">
                            <label>Motivo da Entrada</label>
                            <select id="campo-motivo">
                                <option value=""></option>
                                <option value="resgate">Resgate</option>
                                <option value="abandono">Abandono</option>
                                <option value="devolucao">Devolução</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label>Status de Saúde</label>
                            <select id="campo-saude">
                                <option value=""></option>
                                <option value="saudavel">Saudável</option>
                                <option value="em_tratamento">Em Tratamento</option>
                                <option value="critico">Crítico</option>
                            </select>
                        </div>

                        <div class="input-group full-width">
                            <label>Descrição/Observações:</label>
                            <textarea id="campo-descricao"></textarea>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div class="modal-footer" id="modalFooter">
        </div>
    </div>

    <script>
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const modalFooter = document.getElementById('modalFooter');
        const registroForm = document.getElementById('registroAnimalForm');

        // Verifica se é modo edição
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('id');
        let animalEditando = null;

        if (editId) {
            document.querySelector('h2').textContent = 'Editar Animal';
            fetch(`../actions/animal.php?action=listar`)
                .then(r => r.json())
                .then(lista => {
                    animalEditando = lista.find(a => String(a.id_animal) === editId);
                    if (!animalEditando) return;

                    document.getElementById('campo-nome').value = animalEditando.nome || '';
                    document.getElementById('campo-especie').value = animalEditando.especie || '';
                    document.getElementById('campo-raca').value = animalEditando.raca || '';
                    document.getElementById('campo-nascimento').value = animalEditando.dataNascimento || '';
                    document.getElementById('campo-cor').value = animalEditando.cor || '';
                    document.getElementById('campo-porte').value = animalEditando.tamanho || '';
                    document.getElementById('campo-descricao').value = animalEditando.descricao || '';

                    if (animalEditando.genero === 'Macho') {
                        document.getElementById('btn-femea').classList.remove('active');
                        document.getElementById('btn-macho').classList.add('active');
                    }
                });
        }

        function showStep(stepNumber) {
            if (stepNumber === 1) {
                step1.classList.add('active');
                step2.classList.remove('active');
                modalFooter.innerHTML = `<button type="button" class="btn btn-primary" onclick="showStep(2)">Próximo</button>`;
            } else if (stepNumber === 2) {
                step1.classList.remove('active');
                step2.classList.add('active');
                modalFooter.innerHTML = `
                    <button type="button" class="btn btn-secondary" onclick="showStep(1)">Voltar</button>
                    <button type="submit" form="registroAnimalForm" class="btn btn-primary">${editId ? 'Salvar' : 'Finalizar'}</button>
                `;
            }
        }

        document.addEventListener('click', function (e) {
            if (e.target.parentElement && e.target.parentElement.classList.contains('gender-toggle')) {
                const buttons = e.target.parentElement.querySelectorAll('button');
                buttons.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
            }
        });

        registroForm.addEventListener('submit', async function (e) {
            e.preventDefault();

            try {
                const generoAtivo = step1.querySelector('.gender-toggle button.active');

                const dadosAnimal = {
                    action: editId ? 'editar' : 'criar',
                    id: editId ? Number(editId) : undefined,
                    nome: document.getElementById('campo-nome').value || 'Sem nome',
                    especie: document.getElementById('campo-especie').value || '',
                    raca: document.getElementById('campo-raca').value || '',
                    genero: generoAtivo ? generoAtivo.innerText : 'Fêmea',
                    data_nascimento: document.getElementById('campo-nascimento').value || '',
                    cor: document.getElementById('campo-cor').value || '',
                    porte: document.getElementById('campo-porte').value || '',
                    descricao: document.getElementById('campo-descricao').value || ''
                };

                const resposta = await fetch('../actions/animal.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosAnimal)
                });
                const resultado = await resposta.json();

                if (resultado.erro) throw new Error(resultado.erro);

                alert(editId ? 'Animal atualizado com sucesso!' : '🐾 Sucesso! Animal registrado no sistema.');
                window.location.href = 'consulta-animal.html';
            } catch (error) {
                console.error("Erro ao salvar:", error);
                alert("Ocorreu um erro ao salvar o animal.");
            }
        });

        showStep(1);
    </script>
</body>

</html>
