<script>
document.addEventListener("DOMContentLoaded", function () {
    // ===== CONFIGURAÇÕES DE PAGINAÇÃO =====
    const itensPorPagina = 8;
    let paginaAtual = 1;
    const dadosGerais = JSON.parse(localStorage.getItem('aumigos_dados') || '[]');
    
    // ===== LÓGICA DA NAVBAR =====
    const navbar = document.getElementById('floatingNavbar');
    const menuToggle = document.getElementById('menuToggle');
    if (menuToggle && navbar) {
        menuToggle.addEventListener('click', (e) => {
            navbar.classList.toggle('menu-open');
            e.stopPropagation();
        });
        document.addEventListener('click', (e) => {
            if (!navbar.contains(e.target)) navbar.classList.remove('menu-open');
        });
    }

    // ===== FUNÇÃO PRINCIPAL DE RENDERIZAÇÃO =====
    function renderizarTabela() {
        const listaContainer = document.querySelector('.consulta-list');
        const header = document.querySelector('.list-header');
        
        // Limpa a lista mantendo apenas o cabeçalho
        listaContainer.innerHTML = '';
        listaContainer.appendChild(header);

        // Cálculo dos índices para fatiar os dados
        const inicio = (paginaAtual - 1) * itensPorPagina;
        const fim = inicio + itensPorPagina;
        const itensExibidos = dadosGerais.slice(inicio, fim);

        itensExibidos.forEach(animal => {
            const row = document.createElement('div');
            row.className = 'list-row grid-layout';
            row.innerHTML = `
                <div class="col-checkbox"><input type="checkbox" class="custom-checkbox animal-check"></div>
                <div class="col-id font-bold">${animal.id}</div>
                <div class="col-nome">
                    <div class="animal-photo"></div>
                    <span class="font-bold">${animal.nome}</span>
                </div>
                <div class="col-perfil font-bold">${animal.especie}<br>${animal.raca}</div>
                <div class="col-caracteristicas font-bold">${animal.genero}</div>
                <div class="col-entrada font-bold">${animal.entrada}</div>
                <div class="col-status">
                    <select class="status-badge status-${animal.status}" data-id="${animal.id}" onchange="atualizarCorStatus(this)">
                        <option value="disponivel" ${animal.status === 'disponivel' ? 'selected' : ''}>Disponível</option>
                        <option value="tratamento" ${animal.status === 'tratamento' ? 'selected' : ''}>Em tratamento</option>
                        <option value="processo" ${animal.status === 'processo' ? 'selected' : ''}>Processo</option>
                        <option value="adotado" ${animal.status === 'adotado' ? 'selected' : ''}>Adotado</option>
                    </select>
                </div>
            `;
            listaContainer.appendChild(row);
        });

        atualizarControlesPaginacao();
    }

    // ===== LÓGICA DOS BOTÕES DE PÁGINA =====
    function atualizarControlesPaginacao() {
        const paginacaoContainer = document.querySelector('.pagination');
        const totalPaginas = Math.ceil(dadosGerais.length / itensPorPagina) || 1;

        // Limpa os botões antigos, mas mantém a estrutura de ícones se desejar recriar
        paginacaoContainer.innerHTML = '';

        // Botão Anterior
        const btnAnt = document.createElement('button');
        btnAnt.className = 'page-btn';
        btnAnt.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><polyline points="15 18 9 12 15 6"></polyline></svg>`;
        btnAnt.disabled = paginaAtual === 1;
        btnAnt.onclick = () => { if(paginaAtual > 1) { paginaAtual--; renderizarTabela(); }};
        paginacaoContainer.appendChild(btnAnt);

        // Números das Páginas
        for (let i = 1; i <= totalPaginas; i++) {
            const btn = document.createElement('button');
            btn.className = `page-btn ${i === paginaAtual ? 'active' : ''}`;
            btn.innerText = i;
            btn.onclick = () => { paginaAtual = i; renderizarTabela(); };
            paginacaoContainer.appendChild(btn);
        }

        // Botão Próximo
        const btnProx = document.createElement('button');
        btnProx.className = 'page-btn';
        btnProx.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><polyline points="9 18 15 12 9 6"></polyline></svg>`;
        btnProx.disabled = paginaAtual === totalPaginas;
        btnProx.onclick = () => { if(paginaAtual < totalPaginas) { paginaAtual++; renderizarTabela(); }};
        paginacaoContainer.appendChild(btnProx);
    }

    // Inicializa a tabela
    renderizarTabela();

    // Checkbox Master
    document.addEventListener('change', (e) => {
        if(e.target.classList.contains('custom-checkbox') && e.target.closest('.list-header')) {
            document.querySelectorAll('.animal-check').forEach(cb => cb.checked = e.target.checked);
        }
    });
});

// Função de Status (fora do DOMContentLoaded para ser acessível pelo onchange inline)
function atualizarCorStatus(selectElement) {
    const animalId = selectElement.getAttribute('data-id');
    const novoStatus = selectElement.value;
    let lista = JSON.parse(localStorage.getItem('aumigos_dados') || '[]');

    selectElement.className = `status-badge status-${novoStatus}`;
    
    lista = lista.map(a => a.id == animalId ? { ...a, status: novoStatus } : a);
    localStorage.setItem('aumigos_dados', JSON.stringify(lista));
}
</script>
