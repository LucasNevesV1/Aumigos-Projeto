<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuMigos - Login</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="auth-page auth-page--login">
    <!-- Botão de Voltar -->
    <a href="../index.html" class="back-button" title="Voltar para página inicial">
        <img src="../assets/img/arrowback.png" alt="Voltar" class="back-button__icon">
    </a>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="../assets/img/Prancheta 3.png" alt="AuMigos Logo" class="auth-logo">
                <h1 class="auth-title">Bem-vindo!</h1>
            </div>

            <form method="POST" action="processar.php" class="auth-form">
                <input type="text" name="email" placeholder="Email" required class="auth-input auth-input--bordered">
                
                <div class="auth-password-wrapper">
                    <input type="password" name="senha" id="login-password-input" placeholder="Senha" required class="auth-input auth-input--bordered">
                    <button type="button" class="auth-password-toggle" id="login-password-toggle">
                        <img src="../assets/img/eyeclose.png" alt="Mostrar senha" id="login-eye-icon" class="auth-password-toggle__icon">
                    </button>
                </div>

                <button type="submit" class="auth-button auth-button--primary">
                    Vamos lá!
                </button>
                
                <div class="auth-forgot-link">
                    <a href="#">Esqueci minha senha</a>
                </div>
            </form>

            <p class="auth-link-text">
                <a href="cadastro.html">Não tenho uma conta</a>
            </p>
        </div>
    </div>

    <script src="../assets/js/script.js"></script>
</body>

</html>
