<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuMigos - Redefinir senha</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="auth-page auth-page--login">

    <!-- Botão Voltar -->
    <a href="login-usuario.html" class="back-button" title="Voltar para login">
        <img src="../assets/img/arrowback.png" alt="Voltar" class="back-button__icon">
    </a>

    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-header">
                <img src="../assets/img/Prancheta 3.png" alt="AuMigos Logo" class="auth-logo">
                <h1 class="auth-title">Nova senha</h1>
                <p class="auth-subtitle">Digite e confirme sua nova senha.</p>
            </div>

            <form id="redefinir-form" method="POST" action="../actions/redefinir-senha.php" class="auth-form">

                <input type="hidden" name="token" id="token-input">

                <div class="auth-password-wrapper">
                    <input
                        type="password"
                        name="senha"
                        id="nova-senha-input"
                        placeholder="Nova senha"
                        required
                        autocomplete="new-password"
                        class="auth-input auth-input--bordered">
                    <button type="button" class="auth-password-toggle" id="nova-senha-toggle">
                        <img src="../assets/img/eyeclose.png" alt="Mostrar senha" id="nova-senha-eye" class="auth-password-toggle__icon">
                    </button>
                </div>

                <div class="auth-password-wrapper">
                    <input
                        type="password"
                        name="confirmar_senha"
                        id="confirmar-nova-senha-input"
                        placeholder="Confirmar nova senha"
                        required
                        autocomplete="new-password"
                        class="auth-input auth-input--bordered">
                    <button type="button" class="auth-password-toggle" id="confirmar-nova-toggle">
                        <img src="../assets/img/eyeclose.png" alt="Mostrar senha" id="confirmar-nova-eye" class="auth-password-toggle__icon">
                    </button>
                </div>

                <button type="submit" class="auth-button auth-button--primary">
                    Salvar nova senha
                </button>

            </form>

            <p class="auth-link-text">
                <a href="login-usuario.html">Voltar para o login</a>
            </p>

        </div>
    </div>

    <script src="../assets/js/script.js"></script>

</body>

</html>
