<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuMigos - Redefinir senha</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="auth-page auth-page--login">
    <!-- Botão de Voltar -->
    <a href="login-usuario.html" class="back-button" title="Voltar para login">
        <img src="../assets/img/arrowback.png" alt="Voltar" class="back-button__icon">
    </a>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="../assets/img/Prancheta 3.png" alt="AuMigos Logo" class="auth-logo">
                <h1 class="auth-title">Nova senha</h1>
                <p class="auth-subtitle">Digite e confirme sua nova senha.</p>
            </div>

            <form method="POST" action="../actions/redefinir-senha.php" class="auth-form" id="redefinir-form">
                <input type="hidden" name="token" id="token-input">

                <div class="auth-password-wrapper">
                    <input type="password" name="senha" id="nova-senha-input" placeholder="Nova senha" required class="auth-input auth-input--bordered">
                    <button type="button" class="auth-password-toggle" id="nova-senha-toggle">
                        <img src="../assets/img/eyeclose.png" alt="Mostrar senha" id="nova-senha-eye" class="auth-password-toggle__icon">
                    </button>
                </div>

                <div class="auth-password-wrapper">
                    <input type="password" name="confirmar_senha" id="confirmar-nova-senha-input" placeholder="Confirmar nova senha" required class="auth-input auth-input--bordered">
                    <button type="button" class="auth-password-toggle" id="confirmar-nova-toggle">
                        <img src="../assets/img/eyeclose.png" alt="Mostrar senha" id="confirmar-nova-eye" class="auth-password-toggle__icon">
                    </button>
                </div>

                <div id="feedback-message"></div>

                <button type="submit" class="auth-button auth-button--primary">
                    Salvar nova senha
                </button>
            </form>

            <p class="auth-link-text">
                <a href="login-usuario.html">Voltar para o login</a>
            </p>
        </div>
    </div>

    <script src="../assets/js/script.js"></script>
    <script>
        // ===== TOGGLE VER/OCULTAR SENHA =====
        function setupToggle(toggleId, inputId, eyeId) {
            const toggle = document.getElementById(toggleId);
            const input  = document.getElementById(inputId);
            const eye    = document.getElementById(eyeId);
            if (!toggle || !input || !eye) return;
            toggle.addEventListener('click', function() {
                const show = input.getAttribute('type') === 'password';
                input.setAttribute('type', show ? 'text' : 'password');
                eye.src = show ? '../assets/img/eyeopen.png' : '../assets/img/eyeclose.png';
                eye.alt = show ? 'Ocultar senha' : 'Mostrar senha';
            });
        }

        setupToggle('nova-senha-toggle',    'nova-senha-input',          'nova-senha-eye');
        setupToggle('confirmar-nova-toggle', 'confirmar-nova-senha-input', 'confirmar-nova-eye');

        // ===== TOKEN + ERROS =====
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            const msg = document.getElementById('feedback-message');
            msg.textContent = 'Link inválido ou expirado. Solicite um novo.';
            msg.style.cssText = 'color:#e07a2f;font-size:13px;text-align:center;margin-bottom:12px;';
            document.getElementById('redefinir-form').style.display = 'none';
        } else {
            document.getElementById('token-input').value = token;
        }

        // Erros vindos do PHP
        const erros = {
            token_invalido:   'Link inválido ou expirado. Solicite um novo.',
            campos_vazios:    'Preencha todos os campos.',
            senhas_diferentes: 'As senhas não coincidem.',
        };

        const erro = params.get('erro');
        if (erro && erros[erro]) {
            const msg = document.getElementById('feedback-message');
            msg.textContent = erros[erro];
            msg.style.cssText = 'color:#e07a2f;font-size:13px;text-align:center;margin-bottom:12px;';
        }
    </script>
</body>

</html>
